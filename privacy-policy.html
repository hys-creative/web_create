<h1>プライバシーポリシー</h1>
<p>本アプリは、Instagram Graph APIを利用してInstagramへのコンテンツ投稿を行う個人利用のツールです。</p>
<h2>収集する情報</h2>
<p>本アプリは第三者のデータを収集・保存しません。APIアクセスに必要なトークン情報のみを使用します。</p>
<h2>情報の利用目的</h2>
<p>取得した情報はInstagramへの投稿処理にのみ使用します。</p>
<h2>第三者への提供</h2>
<p>取得した情報を第三者に提供することはありません。</p>
<h2>お問い合わせ</h2>
<p>本ポリシーに関するお問い合わせはアプリ管理者までご連絡ください。</p>
<p>最終更新日: 2026年6月27日</p>
